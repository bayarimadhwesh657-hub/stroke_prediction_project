<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        table{
            margin:auto;
            margin-top:30px;
            border-collapse:collapse;
            width:95%;
            background:white;
        }

        th, td{
            border:1px solid black;
            padding:10px;
        }

        th{
            background:blue;
            color:white;
        }

        a{
            text-decoration:none;
            color:blue;
            font-weight:bold;
        }

    </style>
</head>

<body>

<h2>Prediction History</h2>

<a href="/">Go Back</a>

<table>

    <tr>
        <th>ID</th>
        <th>Age</th>
        <th>Hypertension</th>
        <th>Heart Disease</th>
        <th>Glucose</th>
        <th>BMI</th>
        <th>Prediction</th>
        <th>Risk %</th>
        <th>Date & Time</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
</html>
